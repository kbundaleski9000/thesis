# Small grid, 2 groups - faster testing
grid:
  rows: 3
  cols: 5
  obstacles:
    - [1, 1]
    - [1, 3]
groups:
  - source: [0, 0]
    sink: [2, 4]
    mass: 1.0
    label: "Group 1"

solver:
  eta: 0.1
  tau: 0.01
  T: 200
  alpha: 1.0
  H: 7

trainer:
  leader_lr: 0.02
  num_epochs: 100
  leader_loss_objective: "social_optimum"  # or "congestion_minimization"

device: "cpu"  # or "cuda" if GPU is available
