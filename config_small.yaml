# Small grid, 2 groups - faster testing
grid:
  rows: 3
  cols: 3
  obstacles: []

groups:
  - source: [0, 0]
    sink: [2, 2]
    mass: 0.5
    label: "Group 1"
  - source: [2, 2]
    sink: [0, 0]
    mass: 0.5
    label: "Group 2"

solver:
  eta: 0.1
  tau: 0.01
  T: 100
  alpha: 1.0
  H: 5

trainer:
  leader_lr: 0.01
  num_epochs: 20

device: "cuda"
